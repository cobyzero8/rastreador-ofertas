name: 💥 Escaneo Automático Radar Familiar

on:
  schedule:
    # Corre automáticamente cada 4 horas (en hora UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Esto te permite también probarlo manualmente desde GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Clonar repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar librerías
        run: |
          pip install beautifulsoup4 requests streamlit pandas

      - name: 💥 Ejecutar el rastro de ofertas
        env:
          # Si usas variables de entorno para Telegram, las declaramos aquí
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          CHAT_ID_TELEGRAM: ${{ secrets.CHAT_ID_TELEGRAM }}
        run: |
          python -c "from scraper import revisar_ofertas; revisar_ofertas()"

      - name: 💾 Guardar cambios en el historial (urls.txt y json)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add urls.txt historial_precios.json || true
          git commit -m "🤖 Actualización automática de precios e historial [Skip CI]" || true
          git push || true
