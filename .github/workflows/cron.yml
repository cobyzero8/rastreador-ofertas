name: Radar de Ofertas Coby Automático

on:
  schedule:
    # 🕒 Configuración de patrullaje intensivo en formato UTC
    # Corre cada 4 horas todos los días (Equivale a las 02:00, 06:00, 10:00, 14:00, 18:00 y 22:00 hora Perú)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Esto te permite también activar la guardia manualmente desde el propio GitHub si quieres

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonando Repositorio
        uses: actions/checkout@v3

      - name: 🐍 Configurando Python de Élite
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⚡ Instalar Librerías Requeridas
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 supabase pandas plotly streamlit

      - name: 🚀 Iniciar Patrullaje de Ofertas Nocturno
        env:
          SUPABASE_URL: "https://uxornuepdxqlhzizjnhr.supabase.co"
          SUPABASE_KEY: "sb_publishable_LG-EavkoMBYDSCS0xsCccQ_1062w4zq"
        run: python scraper.py
