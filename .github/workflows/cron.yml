name: Escaneo Automático Radar Familiar

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # Este activa tu botón gris manual

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar herramientas y Ejecutar el rastro de ofertas
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 supabase pandas plotly streamlit
          python -c "from scraper import revisar_ofertas; revisar_ofertas()"

      - name: Guardar cambios en el historial (urls.txt y json)
        run: |
          print("Guardando historial...")
