name: Patrullero de Ofertas Coby 24/7

on:
  schedule:
    # Corre automáticamente cada 45 minutos
    - cron: '*/45 * * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cron_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando Repositorio
        uses: actions/checkout@v3

      - name: Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando Librerías Básicas y Streamlit
        run: |
          pip install requests beautifulsoup4 supabase urllib3 pandas streamlit st-annotated-text curl_cffi

      - name: Ejecutando Patrullaje de Ofertas
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "import os; from scraper import revisar_ofertas; print(revisar_ofertas('TODOS'))"
