name: Escaneo Automático de Ofertas

on:
  schedule:
    # Se ejecuta a las 03:00, 09:00, 15:00 y 21:00 UTC (Ajustado para Perú)
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # Esto te permite también probarlo desde GitHub si quieres

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar herramientas del robot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el motor de caza
        run: |
          python -c "import scraper; scraper.revisar_ofertas()"
