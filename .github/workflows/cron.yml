name: Patrullero de Ofertas Coby 24/7

on:
  schedule:
    # Corre automáticamente cada 6 horas (a las 00:00, 06:00, 12:00 y 18:00)
    - cron: '0 */6 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cron_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando Repositorio
        uses: actions/checkout@v3

      - name: Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando Librerías Básicas y Streamlit
        run: |
          pip install requests beautifulsoup4 supabase urllib3 pandas streamlit st-annotated-text

      - name: Ejecutando Patrullaje de Ofertas
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "import os; from scraper import revisar_ofertas; print(revisar_ofertas('TODOS', 'TODOS'))"
