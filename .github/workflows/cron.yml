name: Caza Ofertas Piloto Automatico

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch: # Esto activa tu botón gris de prueba manual

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar herramientas obligatorias
        run: |
          python -m pip install --upgrade pip
          pip install streamlit requests beautifulsoup4 supabase pandas plotly

      - name: Ejecutar el motor de caza
        run: |
          python -c "from scraper import revisar_ofertas; revisar_ofertas()"
