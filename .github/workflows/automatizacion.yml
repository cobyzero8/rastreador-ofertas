name: Ejecutor de Rastreador de Ofertas

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5,11,17,1'

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar herramientas necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas

    - name: Correr Rastreador y Responder Telegram
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        python scraper.py

    - name: Guardar Base de Datos Actualizada
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Radar actualizó base de datos [CyberDays Mode]"
        file_pattern: 'historial_precios.json'
