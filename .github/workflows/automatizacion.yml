name: Ejecutor de Rastreador de Ofertas

on:
  schedule:
    # Corre automáticamente todos los días a las 7:00 AM hora de Perú (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch: # Activa el botón manual

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar mi código
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar herramientas necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Correr Rastreador y Enviar Mensaje
      run: python scraper.py
