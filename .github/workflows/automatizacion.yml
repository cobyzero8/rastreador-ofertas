name: Ejecutor de Rastreador de Ofertas

on:
  workflow_dispatch: # Te permite seguir lanzándolo manualmente desde la web o la app
  schedule:
    # Programación inteligente en hora UTC (Restar 5 horas para obtener la hora de Perú)
    # Corre a la medianoche, a las 6 AM, a las 12 PM y a las 8 PM (Horas clave de cambio de precios)
    - cron: '0 5,11,17,1' 

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest

    steps:
    - name: Post descargar mi código
      uses: actions/checkout@v4

    - name: Post Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Instalar herramientas necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas

    - name: Correr Rastreador y Enviar Mensaje
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        python scraper.py

    - name: Guardar Historial de Precios Actualizado
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Radar actualizó base de datos cronológica [CyberDays Mode]"
        file_pattern: 'historial_precios.json'
