name: Ejecutor de Rastreador de Ofertas

on:
  # 💥 Mantiene el botón manual de tu web funcionando
  workflow_dispatch:

  # 🕒 PILOTO AUTOMÁTICO CRONOMETRADO (Corre solo todos los días)
  schedule:
    # Nota: GitHub usa hora UTC. 
    # El robot se ejecutará automáticamente a las 6:00 AM, 12:00 PM, 4:00 PM y 8:00 PM (Hora Perú)
    - cron: '0 11,17,21,1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Librerías Pro
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Ejecutar Motor Scraper
      run: python scraper.py

    - name: Guardar Cambios Automáticos en GitHub
      run: |
        git config --global user.name "CobyZero8-Robot"
        git config --global user.email "bot@cobyzero8.com"
        git add urls.txt historial_precios.json || true
        git commit -m "🤖 Actualización automática del historial de precios y enlaces [Skip CI]" || true
        git push origin main || true
